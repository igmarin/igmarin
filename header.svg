<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1128" />
      <stop offset="60%" stop-color="#102a43" />
      <stop offset="100%" stop-color="#190628" />
    </linearGradient>

    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7f00ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.3"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgGrad)" />

  <rect x="40" y="45" width="5" height="110" rx="2.5" fill="url(#cyanGlow)" filter="url(#glow)" />

  <g transform="translate(65, 0)">
    <text x="0" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="0.5">Ismael Marín</text>
    
    <text x="0" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#00f2fe" letter-spacing="2">RAILS AI TOOLING ENGINEER</text>
    
    <text x="0" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#9fb3c8" opacity="0.9">
      20 years building software — all remote · León, México <tspan fill="#ff4b4b">🇲🇽</tspan>
    </text>
  </g>

  <g transform="translate(730, 100)" stroke="url(#techGrad)" fill="none" stroke-width="1.5">
    <circle r="75" stroke-dasharray="5 3 2 3" opacity="0.4"/>
    <circle r="60" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
    <circle r="45" stroke-dasharray="15 5"/>
    <circle r="25" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    <circle r="10" fill="#00f2fe" fill-opacity="0.2" stroke="#00f2fe" stroke-width="1"/>
    
    <line x1="-90" y1="0" x2="90" y2="0" stroke-dasharray="4 4" opacity="0.3" />
    <line x1="0" y1="-90" x2="0" y2="90" stroke-dasharray="4 4" opacity="0.3" />
    <circle cx="42" cy="-42" r="4" fill="#7f00ff" filter="url(#glow)"/>
    <circle cx="-53" cy="30" r="3" fill="#00f2fe"/>
    <circle cx="50" cy="50" r="2" fill="#ff007f" opacity="0.8"/>
  </g>
  
  <path d="M 500,200 Q 650,120 900,160 L 900,200 Z" fill="url(#techGrad)" opacity="0.08"/>
</svg>